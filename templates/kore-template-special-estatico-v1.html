<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>KORE — Special · Estático 1:1 · v1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0e0e0e; padding: 48px 40px; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; gap: 20px; }
.label { font-size: 11px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: #555; }

.slide { width: 540px; height: 540px; position: relative; overflow: hidden; box-shadow: 0 28px 100px rgba(0,0,0,.8); flex-shrink: 0; }
.slide-inner { width: 1080px; height: 1080px; transform: scale(.5); transform-origin: top left; position: relative; background: #06000E; }

#bg { position: absolute; inset: 0; z-index: 0; }

.depth-glow {
  position: absolute; inset: 0; pointer-events: none; z-index: 1;
  background:
    radial-gradient(ellipse 90% 75% at 50% 44%, rgba(90,10,200,.58) 0%, transparent 60%),
    radial-gradient(ellipse 55% 40% at 22% 70%, rgba(107,33,232,.32) 0%, transparent 55%),
    radial-gradient(ellipse 45% 35% at 78% 20%, rgba(0,50,200,.22) 0%, transparent 50%);
}

#cube { position: absolute; inset: 0; z-index: 2; }

.accent-top { position: absolute; top: 0; left: 0; right: 0; height: 3px; z-index: 20;
  background: linear-gradient(90deg, #00E5FF, #0080FF, #6B21E8); }

.logo-wrap { position: absolute; top: 72px; right: 72px; display: flex; align-items: center; gap: 18px; z-index: 20; animation: fadeIn .8s ease .2s both; }
.logo-wordmark { font-family: 'Abril Fatface', serif; font-size: 32px; color: #E8F4FF; letter-spacing: .04em; }

.content {
  position: absolute; left: 0; right: 0; bottom: 0; z-index: 20;
  padding: 0 72px 90px;
  background: linear-gradient(to top, rgba(2,3,14,.98) 0%, rgba(2,3,14,.88) 40%, rgba(2,3,14,.4) 68%, transparent 100%);
  animation: riseUp 1s cubic-bezier(.16,1,.3,1) .4s both;
}
.eyebrow { font-size: 18px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: #00E5FF; opacity: .8; margin-bottom: 24px; }
.hook { font-family: 'Abril Fatface', serif; font-size: 76px; line-height: 1.04; letter-spacing: -.02em; color: #E8F4FF; margin-bottom: 28px; }
.grad { background: linear-gradient(135deg, #00C4E8 0%, #0070E0 55%, #5B11D8 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.divider { width: 100%; height: 1.5px; background: linear-gradient(90deg, #00E5FF, #0080FF, #6B21E8); opacity: .3; margin-bottom: 28px; }
.sub { font-size: 26px; line-height: 1.6; color: rgba(232,244,255,.42); max-width: 940px; }

@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes riseUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:none} }
</style>
</head>
<body>
<div class="label">Special Edition — Estático · 1080 × 1080 (1:1) · 50% preview</div>

<div class="slide">
<div class="slide-inner">

  <canvas id="bg" width="1080" height="1080"></canvas>
  <div class="depth-glow"></div>
  <canvas id="cube" width="1080" height="1080"></canvas>

  <div class="accent-top"></div>

  <div class="logo-wrap">
    <svg width="52" height="52" viewBox="-55 -55 110 110" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="ngR" cx="35%" cy="30%" r="70%"><stop offset="0%" stop-color="#00E5FF"/><stop offset="55%" stop-color="#0080FF"/><stop offset="100%" stop-color="#6B21E8"/></radialGradient>
        <radialGradient id="hgR" cx="35%" cy="30%" r="70%"><stop offset="0%" stop-color="#00E5FF"/><stop offset="100%" stop-color="#0050CC"/></radialGradient>
      </defs>
      <line x1="0" y1="-44" x2="41.8" y2="-13.6" stroke="#00E5FF" stroke-width="1.8" opacity=".75"/>
      <line x1="41.8" y1="-13.6" x2="25.9" y2="35.6" stroke="#00E5FF" stroke-width="1.8" opacity=".75"/>
      <line x1="25.9" y1="35.6" x2="-25.9" y2="35.6" stroke="#00E5FF" stroke-width="1.8" opacity=".75"/>
      <line x1="-25.9" y1="35.6" x2="-41.8" y2="-13.6" stroke="#00E5FF" stroke-width="1.8" opacity=".75"/>
      <line x1="-41.8" y1="-13.6" x2="0" y2="-44" stroke="#00E5FF" stroke-width="1.8" opacity=".75"/>
      <line x1="0" y1="0" x2="0" y2="-44" stroke="#0080FF" stroke-width="1.2" opacity=".55"/>
      <line x1="0" y1="0" x2="41.8" y2="-13.6" stroke="#0080FF" stroke-width="1.2" opacity=".55"/>
      <line x1="0" y1="0" x2="25.9" y2="35.6" stroke="#0080FF" stroke-width="1.2" opacity=".55"/>
      <line x1="0" y1="0" x2="-25.9" y2="35.6" stroke="#0080FF" stroke-width="1.2" opacity=".55"/>
      <line x1="0" y1="0" x2="-41.8" y2="-13.6" stroke="#0080FF" stroke-width="1.2" opacity=".55"/>
      <circle cx="0" cy="-44" r="5.5" fill="url(#ngR)"/>
      <circle cx="41.8" cy="-13.6" r="5.5" fill="url(#ngR)"/>
      <circle cx="25.9" cy="35.6" r="5.5" fill="url(#ngR)"/>
      <circle cx="-25.9" cy="35.6" r="5.5" fill="url(#ngR)"/>
      <circle cx="-41.8" cy="-13.6" r="5.5" fill="url(#ngR)"/>
      <circle cx="0" cy="0" r="9" fill="url(#hgR)"/>
    </svg>
    <span class="logo-wordmark">KORE</span>
  </div>

  <div class="content">
    <div class="eyebrow">Kore Agency</div>
    <!-- ★ EDITABLE -->
    <div class="hook">
      Datos<br>que fluyen.<br>
      <span class="grad">Mente</span><br>
      que aprende.
    </div>
    <div class="divider"></div>
    <div class="sub">Cada interacción alimenta la inteligencia del siguiente ciclo.</div>
  </div>

</div>
</div>

<script>
// ── Background: Infinite Perspective Grid ──
(function(){
  const canvas = document.getElementById('bg');
  const W = 1080, H = 1080;
  const ctx = canvas.getContext('2d');
  const VPX = W * 0.5;
  const VPY = H * 0.34;
  let offset = 0;

  function drawGrid() {
    ctx.clearRect(0,0,W,H);
    ctx.lineWidth = 1;

    const HLINES = 20;
    for(let i = 0; i < HLINES; i++) {
      const t = ((i / HLINES) + offset) % 1;
      const ease = Math.pow(t, 0.52);
      const y = VPY + (H - VPY) * ease;
      const halfW = W * 0.78 * ease;
      const alpha = ease * 0.14;
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = '#6020C8';
      ctx.beginPath();
      ctx.moveTo(VPX - halfW, y);
      ctx.lineTo(VPX + halfW, y);
      ctx.stroke();
    }

    const VLINES = 14;
    for(let i = 0; i <= VLINES; i++) {
      const t = i / VLINES;
      const xB = W * 0.06 + W * 0.88 * t;
      ctx.globalAlpha = 0.055;
      ctx.strokeStyle = '#4A1090';
      ctx.beginPath();
      ctx.moveTo(VPX, VPY);
      ctx.lineTo(xB, H);
      ctx.stroke();
    }

    ctx.globalAlpha = 0.025;
    ctx.strokeStyle = '#360880';
    for(let y = VPY; y < H; y += 110) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    ctx.globalAlpha = 1;
    offset += 0.0025;
    requestAnimationFrame(drawGrid);
  }
  drawGrid();
})();

// ── Three.js Energy Cube ──
(function(){
  const canvas = document.getElementById('cube');
  if(!canvas || !window.THREE) return;
  const W = 1080, H = 1080;

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setSize(W, H, false);
  renderer.setPixelRatio(1);
  renderer.setClearColor(0x000000, 0);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.5;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(40, W/H, 0.1, 100);
  camera.position.set(0, 0.2, 4.2);
  camera.lookAt(0, 0.2, 0);

  scene.add(new THREE.AmbientLight(0x0C2060, 2.2));
  const mainL = new THREE.PointLight(0x00e5ff, 9.0, 18); mainL.position.set(3, 4, 5); scene.add(mainL);
  const fillL = new THREE.PointLight(0x0040cc, 2.5, 14); fillL.position.set(-4, 0, 3); scene.add(fillL);
  const botL  = new THREE.PointLight(0x6b21e8, 2.0, 10); botL.position.set(0,-4,-2); scene.add(botL);
  const orb   = new THREE.PointLight(0x00ccff, 2.0, 8); scene.add(orb);

  const grp = new THREE.Group();
  const BASE_Y = 0.2;
  grp.position.set(0, BASE_Y, 0);
  grp.scale.setScalar(0.85);
  scene.add(grp);

  const S = 0.28, G = 0.022, ST = S + G, OFF = -ST;
  const cells = [];

  const tc = document.createElement('canvas'); tc.width=256; tc.height=256;
  const pc = tc.getContext('2d');
  const vv = Array.from({length:5},(_,i)=>{const a=(i*2*Math.PI/5)-Math.PI/2; return [128+92*Math.cos(a),128+92*Math.sin(a)];});
  pc.strokeStyle='rgba(255,255,255,.95)'; pc.lineWidth=5;
  pc.beginPath(); vv.forEach(([x,y],i)=>i?pc.lineTo(x,y):pc.moveTo(x,y)); pc.closePath(); pc.stroke();
  pc.lineWidth=3; vv.forEach(([x,y])=>{pc.beginPath();pc.moveTo(128,128);pc.lineTo(x,y);pc.stroke();});
  pc.fillStyle='#fff'; vv.forEach(([x,y])=>{pc.beginPath();pc.arc(x,y,9,0,Math.PI*2);pc.fill();});
  pc.beginPath();pc.arc(128,128,15,0,Math.PI*2);pc.fill();
  const penTex = new THREE.CanvasTexture(tc);

  const baseEmissives = [0x5010C0, 0x0060E0, 0x00A0E0];
  const baseColors    = [0x0D0020, 0x071528, 0x031520];

  for(let iz=0;iz<3;iz++) for(let iy=0;iy<3;iy++) for(let ix=0;ix<3;ix++) {
    const geo = new THREE.BoxGeometry(S,S,S);
    const mat = new THREE.MeshPhysicalMaterial({
      color: baseColors[iz], emissive: new THREE.Color(baseEmissives[iz]), emissiveIntensity: 0,
      roughness: 0.05, metalness: 0.08, transparent: true, opacity: 0.92,
      reflectivity: 0.9, clearcoat: 1.0, clearcoatRoughness: 0.04,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(OFF+ix*ST, OFF+iy*ST, OFF+iz*ST);
    const edgeMat = new THREE.LineBasicMaterial({color:0x00e5ff, transparent:true, opacity:0.85});
    mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), edgeMat));
    if(ix===1&&iy===1&&iz===2){
      const pl=new THREE.Mesh(new THREE.PlaneGeometry(S*.82,S*.82),
        new THREE.MeshBasicMaterial({map:penTex,transparent:true,opacity:.9,depthWrite:false}));
      pl.position.z=S/2+.001; mesh.add(pl);
    }
    grp.add(mesh);
    cells.push({mat, edgeMat, ix, iy, iz});
  }

  let t=0, rx=0, ry=0, rz=0;
  function animate(){
    requestAnimationFrame(animate); t+=.016;
    grp.position.y = BASE_Y + Math.sin(t * 0.4) * 0.07;
    orb.position.set(3.5*Math.cos(t*.35), BASE_Y+2*Math.sin(t*.28), 3.5*Math.sin(t*.35));
    rx+=.0003; ry+=.0008; rz+=.0002;
    grp.rotation.set(rx,ry,rz);
    cells.forEach(({mat, edgeMat, ix, iy, iz})=>{
      mat.emissiveIntensity=(0.5+0.5*Math.sin(t*1.8+(ix+iy*.8+iz*1.1)*.9))*.85;
      const ph = t*0.7 + ix*0.5 + iy*0.6 + iz*0.8;
      const p = Math.sin(ph)*0.5+0.5;
      let er,eg,eb;
      if(p<0.5){const s=p*2; er=0; eg=Math.round(229-s*101); eb=255;}
      else{const s=(p-.5)*2; er=Math.round(s*107); eg=Math.round(128-s*95); eb=Math.round(255-s*23);}
      edgeMat.color.setRGB(er/255,eg/255,eb/255);
    });
    renderer.render(scene,camera);
  }
  animate();
})();
</script>
