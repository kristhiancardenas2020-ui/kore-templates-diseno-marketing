<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>KORE — Reel 9:16 v2 · Light</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #e8e8e8; padding: 48px 40px; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; gap: 20px; }
.label { font-size: 11px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: #666; }

.slide { width: 540px; height: 960px; position: relative; overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,.25); flex-shrink: 0; }
.slide-inner { width: 1080px; height: 1920px; transform: scale(.5); transform-origin: top left; position: relative; background: #F7F9FF; }

/* Plexus canvas — blue on white (Image 5 style) */
canvas { position: absolute; inset: 0; }

/* Light color wash */
.color-wash {
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 50% at 80% 10%, rgba(37,99,235,.05) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 10% 90%, rgba(107,33,232,.04) 0%, transparent 55%);
}

/* Top-bottom vignette */
.vignette-top {
  position: absolute; left:0; right:0; top:0; height:400px;
  background: linear-gradient(to bottom, rgba(247,249,255,.9) 0%, rgba(247,249,255,.4) 50%, transparent 100%);
  pointer-events: none;
}
.vignette-bottom {
  position: absolute; left:0; right:0; bottom:0; height:900px;
  background: linear-gradient(to top, rgba(247,249,255,.97) 0%, rgba(247,249,255,.85) 30%, rgba(247,249,255,.4) 65%, transparent 100%);
  pointer-events: none;
}

/* Logo — top right */
.logo-wrap { position: absolute; top: 88px; right: 88px; display: flex; align-items: center; gap: 20px; animation: fadeIn 1s ease .2s both; }
.logo-svg { width: 64px; height: 64px; }
.logo-wordmark { font-family: 'Abril Fatface', serif; font-size: 36px; color: #060612; letter-spacing: .04em; }

/* Thin accent top line */
.accent-top {
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, #00E5FF, #0080FF, #6B21E8);
}

/* Content — bottom */
.content {
  position: absolute; left: 0; right: 0; bottom: 0;
  padding: 0 88px 140px;
  display: flex; flex-direction: column;
  animation: riseUp 1s cubic-bezier(.16,1,.3,1) .3s both;
}

/* Eyebrow */
.eyebrow {
  font-size: 20px; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase;
  color: #0080FF; margin-bottom: 32px;
}

/* Hook */
.hook {
  font-family: 'Abril Fatface', serif;
  font-size: 88px; line-height: 1.04;
  letter-spacing: -.02em; color: #060612;
  margin-bottom: 40px;
}
.hook .grad {
  background: linear-gradient(135deg, #00C4E8 0%, #0070E0 55%, #5B11D8 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

/* Divider */
.divider {
  width: 100%; height: 1.5px;
  background: linear-gradient(90deg, #00E5FF, #0080FF, #6B21E8);
  margin-bottom: 36px; opacity: .4;
}

/* Sub */
.sub {
  font-size: 28px; line-height: 1.65;
  color: rgba(6,6,18,.45);
  max-width: 860px;
}

@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes riseUp { from{opacity:0;transform:translateY(50px)} to{opacity:1;transform:none} }
</style>
</head>
<body>
<div class="label">Template 1-Light — Reel · 1080 × 1920 px (9:16) · Fondo blanco · 50% preview</div>

<div class="slide">
<div class="slide-inner">

  <!-- Plexus canvas — Image 5 style: blue network on white -->
  <canvas id="pc"></canvas>

  <!-- Color wash -->
  <div class="color-wash"></div>

  <!-- Vignettes -->
  <div class="vignette-top"></div>
  <div class="vignette-bottom"></div>

  <!-- Accent line top -->
  <div class="accent-top"></div>

  <!-- Logo top-right -->
  <div class="logo-wrap">
    <svg class="logo-svg" viewBox="-55 -55 110 110" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="ngL" cx="35%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#3B82F6"/><stop offset="55%" stop-color="#1D4ED8"/><stop offset="100%" stop-color="#1e3a8a"/>
        </radialGradient>
        <radialGradient id="hgL" cx="35%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#60A5FA"/><stop offset="100%" stop-color="#2563EB"/>
        </radialGradient>
      </defs>
      <line x1="0" y1="-44" x2="41.8" y2="-13.6" stroke="#1D4ED8" stroke-width="1.8" opacity=".7"/>
      <line x1="41.8" y1="-13.6" x2="25.9" y2="35.6" stroke="#1D4ED8" stroke-width="1.8" opacity=".7"/>
      <line x1="25.9" y1="35.6" x2="-25.9" y2="35.6" stroke="#1D4ED8" stroke-width="1.8" opacity=".7"/>
      <line x1="-25.9" y1="35.6" x2="-41.8" y2="-13.6" stroke="#1D4ED8" stroke-width="1.8" opacity=".7"/>
      <line x1="-41.8" y1="-13.6" x2="0" y2="-44" stroke="#1D4ED8" stroke-width="1.8" opacity=".7"/>
      <line x1="0" y1="0" x2="0" y2="-44" stroke="#3B82F6" stroke-width="1.2" opacity=".55"/>
      <line x1="0" y1="0" x2="41.8" y2="-13.6" stroke="#3B82F6" stroke-width="1.2" opacity=".55"/>
      <line x1="0" y1="0" x2="25.9" y2="35.6" stroke="#3B82F6" stroke-width="1.2" opacity=".55"/>
      <line x1="0" y1="0" x2="-25.9" y2="35.6" stroke="#3B82F6" stroke-width="1.2" opacity=".55"/>
      <line x1="0" y1="0" x2="-41.8" y2="-13.6" stroke="#3B82F6" stroke-width="1.2" opacity=".55"/>
      <circle cx="0" cy="-44" r="6" fill="url(#ngL)"/>
      <circle cx="41.8" cy="-13.6" r="6" fill="url(#ngL)"/>
      <circle cx="25.9" cy="35.6" r="6" fill="url(#ngL)"/>
      <circle cx="-25.9" cy="35.6" r="6" fill="url(#ngL)"/>
      <circle cx="-41.8" cy="-13.6" r="6" fill="url(#ngL)"/>
      <circle cx="0" cy="0" r="9" fill="url(#hgL)"/>
    </svg>
    <span class="logo-wordmark">KORE</span>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="eyebrow">Kore Agency</div>

    <!-- ★ EDITABLE: Hook -->
    <div class="hook">
      La mayoría invierte.<br>
      Pocos <span class="grad">aprenden</span><br>
      de cada euro.
    </div>

    <div class="divider"></div>

    <!-- ★ EDITABLE: Sub -->
    <div class="sub">
      Inteligencia que se construye ciclo a ciclo.
    </div>
  </div>

</div>
</div>

<script>
(function(){
  const canvas = document.getElementById('pc');
  const W = 1080, H = 1920, N = 70;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  const pts = Array.from({length:N}, () => ({
    x: Math.random()*W, y: Math.random()*H,
    vx: (Math.random()-.5)*.45, vy: (Math.random()-.5)*.45,
    r: 3.5 + Math.random()*4.5,
    op: .6 + Math.random()*.35
  }));
  const CONN = 200;
  function draw(){
    ctx.clearRect(0,0,W,H);
    // Lines — Image 5 style: thin blue lines, triangulated mesh
    for(let i=0;i<N;i++){
      for(let j=i+1;j<N;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<CONN){
          ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=`rgba(0,100,210,${(1-d/CONN)*.32})`; ctx.lineWidth=.9; ctx.stroke();
        }
      }
    }
    // Nodes — small blue dots (Image 5 style)
    pts.forEach(p=>{
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,80,200,${p.op+.1})`; ctx.fill();
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>W) p.vx*=-1;
      if(p.y<0||p.y>H) p.vy*=-1;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
<!--
  ★ EDITABLE: .hook + .sub + .eyebrow
  REST: logo, plexus canvas, accent line top, vignettes — FIXED
-->
</body>
</html>
